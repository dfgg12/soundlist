<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    width: 100vw;
    height: 100vh;
  }

  /* Marquee bar - pinned to bottom */
  .bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 48px;
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.78);
    border-bottom: 2px solid #ff4400;
    overflow: hidden;
  }

  #clock {
    flex-shrink: 0;
    padding: 0 14px;
    font-family: monospace;
    font-size: 16px;
    color: lightgray;
    border-right: 2px solid #ff4400;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .label {
    flex-shrink: 0;
    padding: 0 14px;
    font-size: 12px;
    font-weight: 700;
    color: #ff4400;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-right: 2px solid #ff4400;
    height: 100%;
    display: flex;
    align-items: center;
    white-space: nowrap;
    background: rgba(0, 0, 0, 0.6);
  }

  .scroll-wrap {
    flex: 1;
    overflow: hidden;
    height: 100%;
    display: flex;
    align-items: center;
  }

  .scroll-inner {
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
    animation: marquee 60s linear infinite; /* default until JS measures */
  }

  .scroll-inner .slop {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    padding-right: 64px;
  }

  .scroll-inner .commit {
    font-size: 13px;
    font-weight: 500;
    color: #aaffaa;
    font-family: monospace;
    padding-right: 64px;
  }

  .scroll-inner .sha {
    color: #ff9944;
  }

  .scroll-inner .cdate {
    color: #888888;
  }

  .sep {
    color: #ff4400;
    padding-right: 64px;
    font-size: 16px;
    flex-shrink: 0;
  }

  @keyframes marquee {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
</style>
</head>
<body>

<div class="bar">
  <div id="clock">2026/06/04 00:00:00</div>
  <div class="label">slopmaxxing</div>
  <div class="scroll-wrap">
    <div class="scroll-inner" id="ticker"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.18.1/moment.min.js"></script>
<script>
// -- Clock --
var clockEl = document.getElementById('clock');
function tick() { clockEl.textContent = moment().format('YYYY/MM/DD HH:mm:ss'); }
setInterval(tick, 1000);
tick();

// -- Ticker content --
var slopItems = [
  "eating cereal at 7am",
  "procrastinating at maximum efficiency"
];

var fallbackCommits = [
  { sha: "a88f165", msg: "fix: undo accidental revert of cleanup commit",                    date: "2026-06-04" },
  { sha: "f09b714", msg: "chore: restore marquee.html (stream overlay)",                     date: "2026-06-04" },
  { sha: "9100c37", msg: "chore: remove leftovers; rebuild README with docs index",          date: "2026-06-04" },
  { sha: "bb72abb", msg: "docs: update API ref, README env vars, mark M6 complete",          date: "2026-06-04" },
  { sha: "78ae758", msg: "feat(library): add trigger to own channel directly from library row", date: "2026-06-04" }
];

function buildTicker(commits) {
  var el = document.getElementById('ticker');
  var SEP = '<span class="sep">///</span>';

  var slopHtml = slopItems.map(function(t) {
    return '<span class="slop">' + t + '</span>' + SEP;
  }).join('');

  var commitHtml = commits.map(function(c) {
    var msg = c.msg.split('\n')[0];
    return '<span class="commit">'
      + '<span class="sha">[' + c.sha + ']</span> '
      + msg
      + ' <span class="cdate">(' + c.date + ')</span>'
      + '</span>' + SEP;
  }).join('');

  var content = slopHtml + commitHtml;
  el.innerHTML = content + content; // duplicate for seamless loop

  // Give browser one frame to lay out injected HTML before measuring
  setTimeout(function() {
    var half = el.scrollWidth / 2;
    if (half <= 0) return; // still not laid out, CSS default keeps it running
    var speed = 90; // px/s
    var dur = (half / speed).toFixed(2) + 's';
    el.style.animation = 'marquee ' + dur + ' linear infinite';
  }, 100);
}

function fetchCommits() {
  fetch('https://api.github.com/repos/dfgg12/soundlist/commits?per_page=10')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!Array.isArray(data)) return;
      var commits = data.map(function(c) {
        return {
          sha:  c.sha.slice(0, 7),
          msg:  c.commit.message,
          date: c.commit.author.date.slice(0, 10)
        };
      });
      buildTicker(commits);
    })
    .catch(function() {});
}

// Render immediately so ticker is visible even if network is slow/blocked
buildTicker(fallbackCommits);

// Live fetch on load, then refresh every 5 minutes
fetchCommits();
setInterval(fetchCommits, 5 * 60 * 1000);
</script>

</body>
</html>
