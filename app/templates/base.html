<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Soundlist{% endblock %}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a1a; font-size: 14px; }
nav { background: #18181b; color: #efeff1; padding: 0 1.25rem; height: 48px; display: flex; align-items: center; gap: 1rem; }
nav strong a { color: #bf94ff; text-decoration: none; font-size: 15px; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 0.75rem; }
nav a { color: #dedee3; text-decoration: none; }
nav a:hover { color: #fff; }
.nav-avatar { width: 28px; height: 28px; border-radius: 50%; vertical-align: middle; }
.container { max-width: 1100px; margin: 1.25rem auto; padding: 0 1rem; }
.flash { padding: 0.5rem 0.9rem; border-radius: 4px; margin-bottom: 0.75rem; font-size: 13px; }
.flash-info    { background: #e8f4fd; border: 1px solid #b3d9f7; color: #0c5070; }
.flash-success { background: #e6f4ea; border: 1px solid #a8d5b0; color: #1e5c2e; }
.flash-error   { background: #fdecea; border: 1px solid #f5b8b3; color: #6b1a15; }
h1 { font-size: 1.4rem; margin-bottom: 0.9rem; }
h2 { font-size: 1.1rem; margin: 1.1rem 0 0.6rem; color: #333; }
.card { background: #fff; border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 1rem;
        box-shadow: 0 1px 3px rgba(0,0,0,.08); }
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden;
        box-shadow: 0 1px 3px rgba(0,0,0,.08); }
thead th { background: #f6f6f7; text-align: left; padding: 0.45rem 0.7rem; font-size: 12px;
           text-transform: uppercase; letter-spacing: .04em; color: #555; border-bottom: 1px solid #e3e3e8; }
td { padding: 0.35rem 0.7rem; border-top: 1px solid #ebebf0; vertical-align: middle; }
input[type=text], input[type=number], input[type=url], select {
    border: 1px solid #ccc; border-radius: 3px; padding: 0.25rem 0.4rem;
    font-size: 13px; background: #fff; color: #1a1a1a;
}
input[type=text]:focus, input[type=number]:focus, input[type=url]:focus, select:focus {
    outline: 2px solid #7c3aed; outline-offset: 0; border-color: #7c3aed;
}
.btn { display: inline-block; padding: 0.3rem 0.75rem; border: none; border-radius: 3px;
       cursor: pointer; font-size: 13px; line-height: 1.4; }
.btn-primary  { background: #7c3aed; color: #fff; }
.btn-primary:hover { background: #6d28d9; }
.btn-danger   { background: #dc2626; color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-secondary { background: #6b7280; color: #fff; }
.btn-secondary:hover { background: #4b5563; }
.btn-twitch { background: #9146ff; color: #fff; font-size: 14px; padding: 0.4rem 1rem; }
.btn-twitch:hover { background: #7c2dff; }
.badge { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 3px; font-size: 11px; }
.badge-on  { background: #d1fae5; color: #065f46; }
.badge-off { background: #f3f4f6; color: #6b7280; }
</style>
</head>
<body>
<nav>
  <strong><a href="/">Soundlist</a></strong>
  <div class="nav-right">
    {% if user %}
      {% if user.avatar_url %}<img src="{{ user.avatar_url }}" class="nav-avatar" alt="">{% endif %}
      <span>{{ user.display_name }}</span>
      {% if user.is_admin %}<a href="/admin">Admin</a>{% endif %}
      <a href="/logout">Logout</a>
    {% else %}
      <a href="/login" class="btn btn-twitch">Login with Twitch</a>
    {% endif %}
  </div>
</nav>
<div class="container">
  {% for f in flashes %}
  <div class="flash flash-{{ f.level }}">{{ f.msg }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
